# SonarQube exclusion configuration
# This file defines which files and directories should be excluded from SonarQube analysis.

# Exclude example and documentation directories which contain sample credentials
sonar.exclusions=Ejemplos/**/*, examples/**/*, docs/**/*, documentacion/**/*, **/*.dist, config.dev.yaml, config.docker.yaml

# Exclude test files from general analysis (they are still analyzed as tests)
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Specific exclusions for credential detection in tests (if using a local scanner)
# In SonarCloud, these are better managed through the UI, but this file helps
# document our intention.
